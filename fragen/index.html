<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fragen | FinanzApp</title>
  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="/shared/unified-ui.css" />
</head>
<body>
  <header class="page-topbar">
    <div class="topbar-left">
      <span class="brand-mark">FinanzApp</span>
      <span class="brand-sub">Fragen</span>
    </div>
    <div class="header-controls">
      <nav class="app-nav-links" aria-label="App-Navigation">
        <a class="app-nav-link" href="/dashboard.html">Dashboard</a>
        <a class="app-nav-link" href="/konten/">Kontenverwaltung</a>
        <a class="app-nav-link" href="/groups/">Gruppen</a>
        <a class="app-nav-link" href="/aktien/">Aktien</a>
        <a class="app-nav-link is-active" href="/fragen/">Fragen</a>
      </nav>
      <div class="theme-switch" role="group" aria-label="Farbmodus">
        <button type="button" class="theme-option" data-theme-choice="light">Hell</button>
        <button type="button" class="theme-option" data-theme-choice="dark">Dunkel</button>
        <button type="button" class="theme-option" data-theme-choice="auto">Auto</button>
      </div>
      <div class="profile-wrap">
        <button class="profile-btn" type="button" aria-expanded="false">
          <span class="profile-avatar" data-profile-avatar>U</span>
          <span class="profile-name" data-profile-name>Profil</span>
        </button>
        <div class="profile-menu" hidden>
          <p class="menu-name" data-profile-menu-name>-</p>
          <p class="menu-mail" data-profile-menu-mail>-</p>
          <button class="logout-btn" type="button">Abmelden</button>
        </div>
      </div>
    </div>
  </header>

  <main class="questions-main">
    <section class="panel">
      <h2 class="panel-title">Frage erstellen</h2>
      <form id="question-form" class="form-grid">
        <div>
          <div class="field-head">
            <label class="field-label" for="question-topic">Thema</label>
            <span id="question-topic-counter" class="counter">0/80</span>
          </div>
          <input class="field-input" id="question-topic" name="thema" type="text" maxlength="80" required placeholder="z. B. Wie viele Steuern zahle ich?" />
        </div>
        <div>
          <label class="field-label" for="question-message">Frage</label>
          <textarea class="field-input field-textarea" id="question-message" name="message" maxlength="4000" rows="4" required placeholder="Beschreibe deine Frage im Detail..."></textarea>
        </div>
        <div class="actions">
          <button id="question-submit-btn" class="submit-btn" type="submit">Frage erstellen</button>
          <button id="question-cancel-btn" class="ghost-btn" type="button" hidden>Bearbeitung abbrechen</button>
        </div>
      </form>
      <p id="question-form-status" class="status"></p>
    </section>

    <section class="panel">
      <h2 class="panel-title">Fragen suchen</h2>
      <div class="tools">
        <input class="field-input" id="question-search" type="search" placeholder="Thema, Frage, Autor, Status..." />
      </div>
      <ul id="question-list" class="question-list"></ul>
    </section>
  </main>

  <script src="/shared/js/theme-utils.js"></script>
  <script src="/shared/js/session-utils.js"></script>
  <script src="/shared/js/language-utils.js"></script>
  <script src="/shared/js/currency-utils.js"></script>
  <script src="/shared/js/global-settings.js"></script>
  <script src="/shared/topbar.js"></script>
  <script src="./app.js"></script>
</body>
</html>
