name = "finanzapp-backend"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

kv_namespaces = [
  { binding = "SESSIONS", id = "e95bfb9291194083b786d29d5bd4da8d", preview_id = "fe7c6fdbf4554f409fb5761b3a788461" }
]

[[hyperdrive]]
binding = "HYPERDRIVE"
id = "796290d33c644033a6ad4eca9707cbf0"
# For local dev, override via .dev.vars (gitignored) — set DATABASE_URL there.
localConnectionString = "postgresql://user:password@host:5432/dbname"

[vars]
NODE_ENV = "production"
SESSION_COOKIE_NAME = "finanzapp_session"
SESSION_TTL_MINUTES = "180"
EMAIL_CODE_TTL_MINUTES = "15"
EMAIL_FROM = "FBM Finance <vollmer.trash@web.de>"
OPENROUTER_MODEL = "openai/gpt-oss-20b:free"
OPENROUTER_APP_NAME = "FinanzApp"
FRONTEND_ORIGIN = "https://fbm-finance.com"
