<!doctype html>
<html lang="de">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Aktienansicht | FinanzApp</title>
	<link rel="stylesheet" href="css/ShareView.css">
	<link rel="stylesheet" href="/shared/unified-ui.css">
</head>

<body>
	<header class="page-topbar">
		<h1>Aktienansicht</h1>
		<div class="header-controls">
			<nav class="app-nav-links" aria-label="App-Navigation">
				<a class="app-nav-link" href="/dashboard.html">Dashboard</a>
				<a class="app-nav-link" href="/groups/">Gruppen</a>
				<a class="app-nav-link is-active" href="/aktien/">Aktien</a>
			</nav>
			<div class="theme-switch" role="group" aria-label="Farbmodus">
				<button type="button" class="theme-option" data-theme-choice="light">Hell</button>
				<button type="button" class="theme-option" data-theme-choice="dark">Dunkel</button>
				<button type="button" class="theme-option" data-theme-choice="auto">Auto</button>
			</div>
			<div class="profile-wrap">
				<button class="profile-btn" type="button" aria-expanded="false">
					<span class="profile-avatar" data-profile-avatar>U</span>
					<span class="profile-name" data-profile-name>Profil</span>
				</button>
				<div class="profile-menu" hidden>
					<p class="menu-name" data-profile-menu-name>-</p>
					<p class="menu-mail" data-profile-menu-mail>-</p>
					<button class="logout-btn" type="button">Abmelden</button>
				</div>
			</div>
			<label class="header-account-picker" for="globalBankAccountSelect">
				Bankkonto
				<select id="globalBankAccountSelect" aria-label="Bankkonto auswählen">
					<option value="">Alle Konten</option>
				</select>
			</label>
		</div>
	</header>

	<div class="app">
		<nav>
			<div class="group">
				<div class="group-title">Depot</div>
				<button class="navbtn active" data-view="depot">Gesamtsdepot</button>
				<button class="navbtn" data-view="analysis">Einzelanalyse</button>
				<button class="navbtn" data-view="futureanalysis">Zukunftsaussicht</button>
			</div>

			<div class="group">
				<div class="group-title">Gruppierungen</div>
				<button class="navbtn" data-view="category_common_stock">Stammaktie</button>
				<button class="navbtn" data-view="category_preferred_stock">Vorzugsaktie</button>
				<button class="navbtn" data-view="category_etf">ETFs</button>
				<button class="navbtn" data-view="category_real_estate">Immobilien</button>
				<button class="navbtn" data-view="category_depositary_receipts">Hinterlegungsscheine</button>
				<button class="navbtn" data-view="category_partnerships">Personengesellschaften</button>
				<button class="navbtn" data-view="category_closed_end_funds">Geschlossene Fonds</button>
				<button class="navbtn" data-view="category_etn">ETNs</button>
			</div>


			<p class="hint">
				Falls keine Aktienkurse angezeigt werden liegt dies an der vollständigen Auslastung des API Keys.
			</p>
		</nav>

		<main>


			<div id="viewHost"></div>
		</main>
	</div>

	<script src="/shared/js/theme-utils.js"></script>
	<script src="/shared/js/session-utils.js"></script>
	<script src="/shared/topbar.js"></script>
	<script src="js/ShareView.js"></script>
</body>

</html>
