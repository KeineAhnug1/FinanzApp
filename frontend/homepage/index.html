<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinanzApp | Homepage</title>
  <script>
    (function applyStoredThemeEarly() {
      try {
        var mode = localStorage.getItem("finanzapp.themeMode") || "auto";
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var resolved = mode === "auto" ? (prefersDark ? "dark" : "light") : mode;
        document.documentElement.dataset.theme = resolved;
        document.documentElement.dataset.themeMode = mode;
      } catch {
        document.documentElement.dataset.theme = "light";
        document.documentElement.dataset.themeMode = "auto";
      }
    })();
  </script>
  <link rel="stylesheet" href="/shared/unified-ui.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="homepage-topbar">
    <a id="homepage-brand-link" class="brand-link" href="/homepage/" aria-label="">
      <span class="brand-mark">FinanzApp</span>
      <span id="homepage-brand-sub" class="brand-sub"></span>
    </a>
    <div class="topbar-actions header-controls">
      <a id="top-auth-btn" class="top-auth-btn" href="/"></a>
    </div>
  </header>

  <main class="homepage-main">
    <section class="hero reveal-from-bottom is-visible">
      <p id="homepage-hero-kicker" class="hero-kicker"></p>
      <h1 id="homepage-hero-title"></h1>
      <p id="homepage-hero-body"></p>
      <a id="homepage-hero-cta" class="hero-cta" href="#ai-enhancement"></a>
    </section>

    <section id="ai-enhancement" class="showcase reveal-from-bottom">
      <div class="showcase-content">
        <p id="homepage-ai-tag" class="showcase-tag"></p>
        <h2 id="homepage-ai-title"></h2>
        <p id="homepage-ai-body"></p>
      </div>
      <figure class="showcase-media">
        <img id="homepage-ai-image" src="./images/ai-enhancement.svg" alt="" loading="lazy" />
      </figure>
    </section>

    <section id="quick-register" class="video-story">
      <div class="video-story-sticky">
        <video
          class="video-story-media js-autoplay-on-visible"
          muted
          playsinline
          loop
          preload="metadata"
          id="homepage-register-video"
          aria-label=""
        >
          <source src="./videos/register.mp4" type="video/mp4" />
          <span id="homepage-video-fallback"></span>
        </video>
        <div class="video-story-overlay">
          <p id="homepage-video-tag" class="video-story-tag"></p>
          <h2 id="homepage-video-title"></h2>
          <p id="homepage-video-body"></p>
        </div>
      </div>
    </section>

          id="homepage-income-expenses-video"
          class="showcase-video js-autoplay-on-visible"
          muted
          playsinline
          loop
          preload="metadata"
          aria-label=""
        >
          <source src="./videos/IncomeAndExpenses.mp4" type="video/mp4" />
          <span id="homepage-income-expenses-fallback"></span>
        </video>
      </figure>
    </section>
