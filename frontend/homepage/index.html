<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinanzApp | Homepage</title>
  <script src="/shared/js/theme-init.js"></script>
  <link rel="stylesheet" href="/shared/unified-ui.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="homepage-topbar">
    <a id="homepage-brand-link" class="brand-link" href="/homepage/" aria-label="">
      <span class="brand-mark">FinanzApp</span>
      <span id="homepage-brand-sub" class="brand-sub"></span>
    </a>
    <div class="topbar-actions header-controls">
      <a id="top-auth-btn" class="top-auth-btn" href="/"></a>
    </div>
  </header>

  <main class="homepage-main">
    <section class="hero reveal-from-bottom is-visible">
      <p id="homepage-hero-kicker" class="hero-kicker"></p>
      <h1 id="homepage-hero-title"></h1>
      <p id="homepage-hero-body"></p>
      <a id="homepage-hero-cta" class="hero-cta" href="#ai-enhancement"></a>
    </section>

    <section id="ai-enhancement" class="showcase reveal-from-bottom">
      <div class="showcase-content">
        <p id="homepage-ai-tag" class="showcase-tag"></p>
        <h2 id="homepage-ai-title"></h2>
        <p id="homepage-ai-body"></p>
      </div>
      <figure class="showcase-media">
        <img id="homepage-ai-image" src="./images/ai-enhancement.svg" alt="" loading="lazy" />
      </figure>
    </section>

    <section id="quick-register" class="video-story">
      <div class="video-story-sticky">
        <video
          class="video-story-media js-autoplay-on-visible"
          muted
          playsinline
          loop
          preload="metadata"
          id="homepage-register-video"
          aria-label=""
        >
          <source src="./videos/register.mp4" type="video/mp4" />
          <span id="homepage-video-fallback"></span>
        </video>
        <div class="video-story-overlay">
          <p id="homepage-video-tag" class="video-story-tag"></p>
          <h2 id="homepage-video-title"></h2>
          <p id="homepage-video-body"></p>
        </div>
      </div>
    </section>

    <section id="income-expenses-video" class="showcase reveal-from-bottom">
      <div class="showcase-content">
        <p id="homepage-income-expenses-tag" class="showcase-tag"></p>
        <h2 id="homepage-income-expenses-title"></h2>
        <p id="homepage-income-expenses-body"></p>
      </div>
      <figure class="showcase-media">
        <video
          id="homepage-income-expenses-video"
          class="showcase-video js-autoplay-on-visible"
          muted
          playsinline
          loop
          preload="metadata"
          aria-label=""
        >
          <source src="./videos/IncomeAndExpenses.mp4" type="video/mp4" />
          <span id="homepage-income-expenses-fallback"></span>
        </video>
      </figure>
    </section>

    <section id="minimal-design" class="design-highlights reveal-from-bottom">
      <div class="design-highlights-head">
        <p id="homepage-design-tag" class="showcase-tag"></p>
        <h2 id="homepage-design-title"></h2>
        <p id="homepage-design-body"></p>
      </div>
      <div id="homepage-design-carousel" class="design-carousel">
        <button id="homepage-design-prev" class="design-nav design-nav-prev" type="button" aria-label="">
          <span aria-hidden="true">&#8592;</span>
        </button>
        <div class="design-viewport">
          <article class="design-card is-active">
            <img id="homepage-design-income-image" src="./images/DashboardIncome.png" alt="" loading="lazy" />
            <h3 id="homepage-design-income-title"></h3>
            <p id="homepage-design-income-body"></p>
          </article>
          <article class="design-card">
            <img id="homepage-design-expenses-image" src="./images/DashboardExpenses.png" alt="" loading="lazy" />
            <h3 id="homepage-design-expenses-title"></h3>
            <p id="homepage-design-expenses-body"></p>
          </article>
          <article class="design-card">
            <img id="homepage-design-groupchat-image" src="./images/Groupchat.png" alt="" loading="lazy" />
            <h3 id="homepage-design-groupchat-title"></h3>
            <p id="homepage-design-groupchat-body"></p>
          </article>
          <article class="design-card">
            <img id="homepage-design-stock1-image" src="./images/stock1.png" alt="" loading="lazy" />
            <h3 id="homepage-design-stock1-title"></h3>
            <p id="homepage-design-stock1-body"></p>
          </article>
          <article class="design-card">
            <img id="homepage-design-stock2-image" src="./images/stock2.png" alt="" loading="lazy" />
            <h3 id="homepage-design-stock2-title"></h3>
            <p id="homepage-design-stock2-body"></p>
          </article>
        </div>
        <button id="homepage-design-next" class="design-nav design-nav-next" type="button" aria-label="">
          <span aria-hidden="true">&#8594;</span>
        </button>
      </div>
      <div id="homepage-design-dots" class="design-dots" aria-label=""></div>
    </section>

    <section id="serverless" class="showcase reveal-from-bottom">
      <div class="showcase-content">
        <p id="homepage-serverless-tag" class="showcase-tag"></p>
        <h2 id="homepage-serverless-title"></h2>
        <p id="homepage-serverless-body"></p>
      </div>
      <figure class="showcase-media">
        <img id="homepage-serverless-image" src="./images/serverless.svg" alt="" loading="lazy" />
      </figure>
    </section>

    <section id="quantum" class="showcase reveal-from-bottom">
      <div class="showcase-content">
        <p id="homepage-quantum-tag" class="showcase-tag"></p>
        <h2 id="homepage-quantum-title"></h2>
        <p id="homepage-quantum-body"></p>
      </div>
      <figure class="showcase-media">
        <img id="homepage-quantum-image" src="./images/quantum-ready.svg" alt="" loading="lazy" />
      </figure>
    </section>

    <section id="blockchain" class="showcase reveal-from-bottom">
      <div class="showcase-content">
        <p id="homepage-blockchain-tag" class="showcase-tag"></p>
        <h2 id="homepage-blockchain-title"></h2>
        <p id="homepage-blockchain-body"></p>
      </div>
      <figure class="showcase-media">
        <img id="homepage-blockchain-image" src="./images/blockchain.svg" alt="" loading="lazy" />
      </figure>
    </section>

    <section id="saas" class="showcase reveal-from-bottom">
      <div class="showcase-content">
        <p id="homepage-saas-tag" class="showcase-tag"></p>
        <h2 id="homepage-saas-title"></h2>
        <p id="homepage-saas-body"></p>
      </div>
      <figure class="showcase-media">
        <img id="homepage-saas-image" src="./images/saas.svg" alt="" loading="lazy" />
      </figure>
    </section>

    <section id="loadbalanced" class="showcase reveal-from-bottom">
      <div class="showcase-content">
        <p id="homepage-loadbalanced-tag" class="showcase-tag"></p>
        <h2 id="homepage-loadbalanced-title"></h2>
        <p id="homepage-loadbalanced-body"></p>
      </div>
      <figure class="showcase-media">
        <img id="homepage-loadbalanced-image" src="./images/load-balanced.svg" alt="" loading="lazy" />
      </figure>
    </section>

    <section id="scalable" class="showcase reveal-from-bottom">
      <div class="showcase-content">
        <p id="homepage-scalable-tag" class="showcase-tag"></p>
        <h2 id="homepage-scalable-title"></h2>
        <p id="homepage-scalable-body"></p>
      </div>
      <figure class="showcase-media">
        <img id="homepage-scalable-image" src="./images/scalable.svg" alt="" loading="lazy" />
      </figure>
    </section>

    <section id="aws" class="showcase reveal-from-bottom">
      <div class="showcase-content">
        <p id="homepage-aws-tag" class="showcase-tag"></p>
        <h2 id="homepage-aws-title"></h2>
        <p id="homepage-aws-body"></p>
      </div>
      <figure class="showcase-media">
        <img id="homepage-aws-image" src="./images/aws-backend.svg" alt="" loading="lazy" />
      </figure>
    </section>
  </main>

  <script src="/shared/js/theme-utils.js"></script>
  <script src="/shared/js/language-utils.js"></script>
  <script src="/shared/js/global-settings.js?v=2"></script>
  <script src="./app.js"></script>
</body>
</html>
