<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nachrichten | FinanzApp</title>
    <script src="/shared/js/theme-init.js"></script>
    <link rel="stylesheet" href="/shared/unified-ui.css" />
    <link rel="stylesheet" href="./messages.css" />
  </head>
  <body>
    <header class="page-topbar">
      <div class="topbar-left">
        <span class="brand-mark">FinanzApp</span>
        <span class="brand-sub">Nachrichten</span>
      </div>
      <div class="header-controls">
        <div class="profile-wrap">
          <button id="profile-btn" class="profile-btn" type="button" aria-expanded="false">
            <span class="profile-avatar" id="profile-avatar" data-profile-avatar>U</span>
            <span class="profile-name" id="profile-name" data-profile-name>Profil</span>
          </button>
          <div id="profile-menu" class="profile-menu" hidden>
            <p class="menu-name" id="menu-name" data-profile-menu-name>-</p>
            <p class="menu-mail" id="menu-mail" data-profile-menu-mail>-</p>
            <button id="logout-btn" class="logout-btn" type="button">Abmelden</button>
          </div>
        </div>
      </div>
    </header>

    <main class="msg-layout">

      <!-- Left column: conversation list -->
      <aside class="msg-sidebar" id="msgSidebar">
        <div class="msg-sidebar-header">
          <h1 class="msg-sidebar-title" data-i18n="messages.title">Nachrichten</h1>
          <button id="newConversationBtn" class="msg-new-btn" type="button" title="Neue Konversation">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            <span data-i18n="messages.newConversation">Neue Konversation</span>
          </button>
        </div>

        <!-- User search panel (shown when "Neue Konversation" is clicked) -->
        <div id="userSearchPanel" class="msg-search-panel" hidden>
          <input
            id="userSearchInput"
            class="msg-search-input"
            type="search"
            autocomplete="off"
            maxlength="80"
            data-i18n-placeholder="messages.searchUsers"
            placeholder="Nutzer suchen..."
          />
          <ul id="userSearchResults" class="msg-search-results" role="listbox"></ul>
          <p id="userSearchStatus" class="msg-search-status" aria-live="polite"></p>
        </div>

        <ul id="conversationList" class="msg-conv-list" role="list">
          <!-- filled by JS -->
        </ul>

        <div id="noConversations" class="msg-empty-state" hidden>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <p data-i18n="messages.noConversations">Noch keine Konversationen.</p>
        </div>
      </aside>

      <!-- Right column: chat area -->
      <section class="msg-chat-area" id="msgChatArea">

        <div id="chatEmpty" class="msg-chat-empty">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M56 40a5 5 0 0 1-5 5H19L8 56V16a5 5 0 0 1 5-5h38a5 5 0 0 1 5 5z"/>
          </svg>
          <p>Wähle eine Konversation oder starte eine neue.</p>
        </div>

        <div id="chatContent" class="msg-chat-content" hidden>
          <div class="msg-chat-header">
            <button id="backBtn" class="msg-back-btn" type="button" aria-label="Zurück">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <span id="chatPartnerName" class="msg-chat-partner"></span>
          </div>

          <div id="chatViewport" class="msg-chat-viewport">
            <ul id="chatMessages" class="msg-chat-messages" aria-live="polite"></ul>
          </div>

          <form id="chatForm" class="msg-chat-form" autocomplete="off">
            <input
              id="chatInput"
              class="msg-chat-input"
              type="text"
              maxlength="2000"
              data-i18n-placeholder="messages.typeMessage"
              placeholder="Nachricht eingeben..."
              required
            />
            <button type="submit" class="msg-send-btn" data-i18n="messages.send">Senden</button>
          </form>
          <p id="chatStatus" class="msg-chat-status" aria-live="polite"></p>
        </div>

      </section>
    </main>

    <script src="/shared/js/theme-utils.js" defer></script>
    <script src="/shared/js/session-utils.js" defer></script>
    <script src="/shared/js/language-utils.js" defer></script>
    <script src="/shared/js/currency-utils.js" defer></script>
    <script src="/shared/js/api-client.js" defer></script>
    <script src="/shared/js/global-settings.js?v=2" defer></script>
    <script src="/shared/js/topbar.js?v=3" defer></script>
    <script src="./js/user-search.js" defer></script>
    <script src="./js/chat.js" defer></script>
    <script src="./js/messages.js" defer></script>
  </body>
</html>
