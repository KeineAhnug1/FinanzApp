<!doctype html>
<html lang="de">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Aktienansicht | FinanzApp</title>
	<script src="/shared/js/theme-init.js"></script>
	<link rel="stylesheet" href="css/ShareView.css">
	<link rel="stylesheet" href="/shared/unified-ui.css">
</head>

<body>
	<header class="page-topbar">
		<div class="topbar-left">
			<span class="brand-mark">FinanzApp</span>
			<span class="brand-sub">Dashboard</span>
		</div>
		<div class="header-controls">
			<div class="profile-wrap">
				<button id="profile-btn" class="profile-btn" type="button" aria-expanded="false">
					<span class="profile-avatar" id="profile-avatar" data-profile-avatar>U</span>
					<span class="profile-name" id="profile-name" data-profile-name>Profil</span>
				</button>
				<div id="profile-menu" class="profile-menu" hidden>
					<p class="menu-name" id="menu-name" data-profile-menu-name>-</p>
					<p class="menu-mail" id="menu-mail" data-profile-menu-mail>-</p>
					<button id="logout-btn" class="logout-btn" type="button">Abmelden</button>
				</div>
			</div>
		</div>
	</header>

	<div class="app stocks-page" id="stocks-page">
		<main>
			<div id="viewHost"></div>
		</main>
	</div>

	<script src="/shared/js/theme-utils.js"></script>
	<script src="/shared/js/session-utils.js"></script>
	<script src="/shared/js/language-utils.js"></script>
	<script src="/shared/js/currency-utils.js"></script>
	<script src="/shared/js/api-client.js"></script>
	<script src="/shared/js/global-settings.js?v=2"></script>
	<script src="/shared/js/topbar.js?v=3"></script>
	<script src="js/cache-utils.js"></script>
	<script src="js/account-utils.js"></script>
	<script src="js/chart-utils.js"></script>
	<script src="js/state-api.js"></script>
	<script src="js/views.js"></script>
	<script src="js/domain.js"></script>
	<script src="js/charts.js"></script>
	<script src="js/features.js"></script>
	<script src="js/bootstrap.js"></script>
	<script src="js/app.js"></script>
</body>

</html>
