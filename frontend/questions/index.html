<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fragen | FinanzApp</title>
  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="/shared/unified-ui.css" />
</head>
<body>
  <header class="page-topbar" data-shared-header data-header-sub="Fragen"></header>

  <main class="questions-main">
    <section class="panel">
      <h2 class="panel-title">Frage erstellen</h2>
      <form id="question-form" class="form-grid">
        <div>
          <div class="field-head">
            <label class="field-label" for="question-topic">Thema</label>
            <span id="question-topic-counter" class="counter">0/80</span>
          </div>
          <input class="field-input" id="question-topic" name="thema" type="text" maxlength="80" required placeholder="z. B. Wie viele Steuern zahle ich?" />
        </div>
        <div>
          <label class="field-label" for="question-message">Frage</label>
          <textarea class="field-input field-textarea" id="question-message" name="message" maxlength="4000" rows="4" required placeholder="Beschreibe deine Frage im Detail..."></textarea>
        </div>
        <div class="actions">
          <button id="question-submit-btn" class="submit-btn" type="submit">Frage erstellen</button>
          <button id="question-cancel-btn" class="ghost-btn" type="button" hidden>Bearbeitung abbrechen</button>
        </div>
      </form>
      <p id="question-form-status" class="status"></p>
    </section>

    <section class="panel">
      <h2 class="panel-title">Fragen suchen</h2>
      <div class="tools">
        <input class="field-input" id="question-search" type="search" placeholder="Nach Fragetitel suchen (z. B. Steuern)..." />
      </div>
      <ul id="question-list" class="question-list"></ul>
    </section>
  </main>

  <script src="/shared/js/theme-utils.js"></script>
  <script src="/shared/js/session-utils.js"></script>
  <script src="/shared/js/language-utils.js"></script>
  <script src="/shared/js/currency-utils.js"></script>
  <script src="/shared/js/global-settings.js"></script>
  <script src="/shared/js/header-include.js"></script>
  <script src="/shared/js/topbar.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
