<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frage | FinanzApp</title>
  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="/shared/unified-ui.css" />
</head>
<body>
  <header class="page-topbar">
    <div class="topbar-left">
      <span class="brand-mark">FinanzApp</span>
      <span class="brand-sub">Frage</span>
    </div>
    <div class="header-controls">
      <nav class="app-nav-links" aria-label="App-Navigation">
        <a class="app-nav-link" href="/dashboard.html">Dashboard</a>
        <a class="app-nav-link" href="/konten/">Kontenverwaltung</a>
        <a class="app-nav-link" href="/groups/">Gruppen</a>
        <a class="app-nav-link" href="/aktien/">Aktien</a>
        <a class="app-nav-link is-active" href="/fragen/">Fragen</a>
      </nav>
      <div class="profile-wrap">
        <button class="profile-btn" type="button" aria-expanded="false">
          <span class="profile-avatar" data-profile-avatar>U</span>
          <span class="profile-name" data-profile-name>Profil</span>
        </button>
        <div class="profile-menu" hidden>
          <p class="menu-name" data-profile-menu-name>-</p>
          <p class="menu-mail" data-profile-menu-mail>-</p>
          <button class="logout-btn" type="button">Abmelden</button>
        </div>
      </div>
    </div>
  </header>

  <main class="questions-main question-detail-main">
    <section class="panel">
      <div class="detail-top-actions">
        <a class="inline-btn" href="/fragen/">Zurück zur Suche</a>
      </div>
      <div id="question-detail"></div>
      <p id="question-detail-status" class="status"></p>
    </section>
  </main>

  <script src="/shared/js/theme-utils.js"></script>
  <script src="/shared/js/session-utils.js"></script>
  <script src="/shared/js/language-utils.js"></script>
  <script src="/shared/js/currency-utils.js"></script>
  <script src="/shared/js/global-settings.js"></script>
  <script src="/shared/js/topbar.js"></script>
  <script src="./js/question.js"></script>
</body>
</html>
