<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="#2563eb"/>

  <!-- Bold "F" -->
  <text
    x="13"
    y="44"
    font-family="'Outfit', system-ui, sans-serif"
    font-weight="700"
    font-size="38"
    fill="#ffffff"
    letter-spacing="-1"
  >F</text>

  <!-- Rising curve / arc beneath the F — represents growth & groups connecting -->
  <path
    d="M 12 52 Q 32 40 52 50"
    stroke="#ffffff"
    stroke-width="3"
    stroke-linecap="round"
    opacity="0.9"
    fill="none"
  />

  <!-- Dot at the peak of the curve -->
  <circle cx="32" cy="43" r="2.5" fill="#ffffff" opacity="0.7"/>
</svg>
