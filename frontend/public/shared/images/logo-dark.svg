<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="800" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1A1060"/>
      <stop offset="60%"  stop-color="#130C50"/>
      <stop offset="100%" stop-color="#0A062A"/>
    </linearGradient>
    <linearGradient id="wingFill2" x1="130" y1="155" x2="700" y2="310" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D6DCFF"/>
    </linearGradient>
    <linearGradient id="spineFill2" x1="0" y1="155" x2="0" y2="765" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="40%"  stop-color="#B0BEFF"/>
      <stop offset="78%"  stop-color="#7080EE"/>
      <stop offset="100%" stop-color="#5A6EDD"/>
    </linearGradient>
    <linearGradient id="midFill2" x1="196" y1="490" x2="608" y2="490" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#A8B5FF"/>
      <stop offset="100%" stop-color="#7080EE"/>
    </linearGradient>
    <linearGradient id="barFill2" x1="393" y1="400" x2="645" y2="765" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#5566FF"/>
      <stop offset="100%" stop-color="#B0AAFF"/>
    </linearGradient>
    <filter id="glow2" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="wingShadow2" x="-18%" y="-22%" width="148%" height="158%">
      <feDropShadow dx="3" dy="14" stdDeviation="18" flood-color="#2233AA" flood-opacity="0.6"/>
    </filter>
  </defs>

  <rect width="800" height="800" rx="175" fill="url(#bg2)"/>

  <!-- Subtle glow halo behind the wing -->
  <ellipse cx="430" cy="240" rx="360" ry="110" fill="#3344FF" opacity="0.14" filter="url(#glow2)"/>

  <!-- Bars -->
  <rect x="393" y="598" width="65" height="167" rx="22" fill="url(#barFill2)"/>
  <rect x="483" y="498" width="65" height="267" rx="22" fill="url(#barFill2)"/>
  <rect x="573" y="400" width="65" height="365" rx="22" fill="url(#barFill2)"/>

  <!-- Spine -->
  <rect x="130" y="155" width="66" height="610" rx="33" fill="url(#spineFill2)"/>

  <!-- Top wing -->
  <path d="
    M 196 160
    C 430 148, 625 184, 698 226
    C 732 244, 730 286, 696 300
    C 572 338, 385 330, 196 320
    Z
  " fill="url(#wingFill2)" filter="url(#wingShadow2)"/>

  <!-- Middle arm -->
  <path d="
    M 196 455
    C 368 460, 534 474, 603 496
    C 636 508, 634 540, 601 544
    C 512 552, 348 542, 196 526
    Z
  " fill="url(#midFill2)"/>
</svg>
